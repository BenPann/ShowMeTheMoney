<!DOCTYPE html>
<html lang="zh-Hant" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>快速記帳</title>

<!-- iOS 加入主畫面設定,先預留,之後補圖示 -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="記帳">

<!-- 提早套用已儲存的主題/文字大小/卡片樣式/背景圖片設定,避免每次開啟先閃一下預設樣式再切換 -->
<script>
(function () {
  try {
    var theme = localStorage.getItem("ledger_theme") || "dark";
    document.documentElement.setAttribute("data-theme", theme);

    var steps = { "1": 87.5, "2": 93.75, "3": 100, "4": 112.5, "5": 125 };
    var scale = localStorage.getItem("ledger_font_scale") || "3";
    document.documentElement.style.fontSize = (steps[scale] || 100) + "%";

    // 卡片透明度 / 玻璃樣式,跟主題一樣是裝置層級設定,不分帳號
    var glass = localStorage.getItem("ledger_card_glass") || "auto";
    var opacity = parseInt(localStorage.getItem("ledger_card_opacity") || "100", 10);
    var alpha = opacity / 100;
    var baseRgb = glass === "white" ? "255,255,255" : glass === "black" ? "0,0,0" : (theme === "dark" ? "44,44,46" : "255,255,255");
    document.documentElement.style.setProperty("--card-surface", "rgba(" + baseRgb + "," + alpha + ")");
    document.documentElement.style.setProperty("--card-blur", opacity < 100 ? "blur(14px)" : "none");

    // 背景圖片依帳號區隔,先確認目前是否有「還沒過期」的登入 session,再讀對應帳號的背景圖
    var sessionRaw = localStorage.getItem("ledger_session");
    if (sessionRaw) {
      var session = JSON.parse(sessionRaw);
      if (session && session.expiresAt > Date.now()) {
        var bgImage = localStorage.getItem("ledger_bg_image::" + session.email);
        if (bgImage) {
          document.documentElement.style.setProperty("--custom-bg-image", 'url("' + bgImage + '")');
        }
      }
    }
  } catch (e) { /* localStorage 不可用時,直接使用預設樣式即可 */ }
})();
</script>

<!-- Pico.css 極輕量框架,只負責基礎排版與表單元件樣式 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

<style>
/* ===== 色彩變數:依附圖深色系設定 ===== */
:root[data-theme="dark"] {
  --bg-app: #1c1c1e;
  --bg-card: #2c2c2e;
  --bg-card-hover: #3a3a3c;
  --border-subtle: #3a3a3c;
  --text-main: #f2f2f2;
  --text-muted: #8e8e93;
  --accent: #4a90e2;
  --card-surface: var(--bg-card);
  --card-blur: none;
}

:root[data-theme="light"] {
  --bg-app: #f2f2f7;
  --bg-card: #ffffff;
  --bg-card-hover: #e5e5ea;
  --border-subtle: #d1d1d6;
  --text-main: #1c1c1e;
  --text-muted: #6e6e73;
  --accent: #3d7fd9;
  --card-surface: var(--bg-card);
  --card-blur: none;
}

* { box-sizing: border-box; }

html, body {
  /* 只允許垂直捲動,雙指縮放(pinch-zoom)不在允許清單內,瀏覽器就不會觸發縮放 */
  touch-action: pan-y;
  -ms-touch-action: pan-y;
}

body {
  background-color: var(--bg-app);
  color: var(--text-main);
  margin: 0;
  padding: 0;
  font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
  /* 避免 iOS 加入主畫面後,狀態列/手勢列遮住內容 */
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* 背景圖片圖層:position:fixed 讓大小永遠依照螢幕viewport計算,
   不會受頁面內容捲動高度影響,不會有拉伸或縮放跑掉的問題。
   這裡刻意不用負值 z-index——body 沒有明確建立「堆疊環境」時,
   負值 z-index 的元素會被整個推到 body 自己的底色後面,完全看不見。
   改成:這層維持 z-index:0(不特別疊高),讓下面 #appRoot 疊在它上面一層即可。 */
#bgImageLayer {
  position: fixed;
  inset: 0;
  z-index: 0;
  background-image: var(--custom-bg-image, none);
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  pointer-events: none;
}

/* 實際內容的容器,明確疊在背景圖層上面一層,
   這樣裡面沒有卡片背景包住的文字(頁面標題、月份切換等)才不會被背景圖蓋住 */
#appRoot {
  position: relative;
  z-index: 1;
}

/* 主內容區:每個分頁是一個 <section data-page="..."> ===== */
main.app-content {
  flex: 1;
  padding: 1rem;
  padding-bottom: 90px; /* 留空間給底部分頁列,避免內容被蓋住 */
  overflow-y: auto;
}

.page-title {
  font-size: 1.9rem;
  font-weight: 800;
  letter-spacing: 0.5px;
  color: var(--text-main); /* 不支援 text-stroke 的瀏覽器,退回實心文字,不會整個消失看不見 */
  margin: 0 0 1rem;
}
/* 支援度夠的瀏覽器(iOS Safari / Chrome 都支援)才套用外框字效果,
   文字內部改透明、只留外框線條,做出空心字的設計感 */
@supports (-webkit-text-stroke: 1px black) {
  .page-title {
    color: transparent;
    -webkit-text-stroke: 1.5px var(--text-main);
  }
}

section[data-page] { display: none; }
section[data-page].active { display: block; }

/* ===== 分類九宮格(記帳頁範例內容)===== */
.category-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}
.category-btn {
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border: none;
  border-radius: 10px;
  color: var(--text-main);
  padding: 1.2rem 0.5rem;
  font-size: 1rem;
  font-weight: 500;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.category-btn .category-icon {
  width: 26px;
  height: 26px;
}
.category-btn:hover, .category-btn:active {
  background: var(--bg-card-hover);
}

/* ===== 底部固定分頁列 ===== */
nav.bottom-tabs {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border-top: 0.5px solid var(--border-subtle);
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 4px;
  padding: 6px 4px;
  padding-bottom: calc(6px + env(safe-area-inset-bottom));
}

.tab-btn {
  background: none;
  border: none;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 7px 2px;
  margin: 0 2px;
  border-radius: 12px;
  color: var(--text-muted);
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s ease, color 0.15s ease;
}
.tab-btn svg { width: 26px; height: 26px; }
.tab-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ===== 金額輸入彈出視窗 ===== */
.amount-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: flex-end;
  z-index: 100;
}
.amount-modal.open { display: flex; }

.amount-sheet {
  width: 100%;
  background: var(--bg-app);
  border-radius: 16px 16px 0 0;
  padding: 1rem 1rem calc(1rem + env(safe-area-inset-bottom));
}

.amount-sheet-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 0.75rem;
}
.amount-sheet-cat {
  font-size: 1rem;
  font-weight: 500;
}
.amount-sheet-close {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1.3rem;
  line-height: 1;
  padding: 4px 8px;
}

/* ===== 日期選擇(補記過去帳目用)===== */
.date-chip-row { margin-bottom: 8px; }
.date-chip {
  background: var(--bg-app);
  border: 0.5px solid var(--border-subtle);
  border-radius: 999px;
  color: var(--text-muted);
  font-size: 0.8rem;
  padding: 4px 12px;
}
.date-options-row {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 10px;
}
.date-option-btn {
  background: var(--bg-app);
  border: none;
  border-radius: 999px;
  color: var(--text-main);
  font-size: 0.8rem;
  padding: 5px 12px;
}
.date-option-btn:active { background: var(--bg-card-hover); }
.date-custom-input {
  background: var(--bg-app);
  border: 0.5px solid var(--border-subtle);
  border-radius: 999px;
  color: var(--text-main);
  font-size: 0.8rem;
  padding: 4px 10px;
}

.amount-display {
  text-align: center;
  font-size: 2.4rem;
  font-weight: 500;
  padding: 0.5rem 0 1rem;
  min-height: 3.2rem;
}
.amount-display.placeholder { color: var(--text-muted); }

.quick-amounts {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.quick-amount-btn {
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border: none;
  border-radius: 10px;
  color: var(--text-main);
  padding: 0.8rem 0;
  font-size: 1rem;
}
.quick-amount-btn:active { background: var(--bg-card-hover); }

.keypad {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}
.keypad-btn {
  background: var(--bg-card);
  border: none;
  border-radius: 10px;
  color: var(--text-main);
  padding: 1rem 0;
  font-size: 1.3rem;
}
.keypad-btn:active { background: var(--bg-card-hover); }
.keypad-btn.confirm {
  background: var(--accent);
  color: #fff;
  font-size: 1rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
}
.keypad-btn.confirm .icon-svg { width: 22px; height: 22px; }
.keypad-btn.confirm:disabled {
  opacity: 0.4;
}

/* ===== 備註輸入框 ===== */
.note-textarea {
  width: 100%;
  min-height: 90px;
  background: var(--bg-card);
  border: 0.5px solid var(--border-subtle);
  border-radius: 10px;
  color: var(--text-main);
  padding: 0.75rem 1rem;
  font-size: 0.95rem;
  font-family: inherit;
  resize: none;
  margin-bottom: 12px;
}

/* ===== 分類圖示選擇 ===== */
.cat-icon-picker-btn {
  flex: none;
  width: 42px;
  height: 42px;
  box-sizing: border-box;
  background: var(--bg-card);
  border: 0.5px solid var(--border-subtle);
  border-radius: 8px;
  font-size: 1.1rem;
  color: var(--text-main);
  padding: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
/* 分類管理頁「編輯中」的那一列高度是 36px,圖示按鈕跟著縮小對齊,新增分類列(42px)不受影響 */
.cat-row .cat-icon-picker-btn {
  width: 36px;
  height: 36px;
  margin-bottom: 0;
}

.icon-picker-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 8px;
  max-height: 320px;
  overflow-y: auto;
  margin-bottom: 4px;
}
.icon-picker-btn {
  background: var(--bg-card);
  border: none;
  border-radius: 10px;
  color: var(--text-main);
  padding: 10px 4px 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.icon-picker-btn:active { background: var(--bg-card-hover); }
.icon-picker-label { font-size: 0.7rem; color: var(--text-muted); }
.icon-picker-none {
  width: 22px;
  height: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--text-muted);
}

/* ===== 內嵌 SVG 圖示的通用尺寸 ===== */
.icon-svg {
  width: 22px;
  height: 22px;
  flex: none;
  display: inline-block;
}
.icon-picker-btn .icon-svg { width: 22px; height: 22px; }
.cat-icon { width: 18px; height: 18px; margin-right: 4px; vertical-align: -4px; }
.cat-icon-preview { width: 20px; height: 20px; }

/* 按鈕裡的圖示改用 block,避免 inline-block 預設保留的文字下緣空間
   讓圖示在 flex 置中的按鈕裡看起來偏下方(打勾/叉叉/垃圾桶/筆這幾顆按鈕都適用) */
.cat-icon-btn .icon-svg,
.cat-submit-btn .icon-svg,
.keypad-btn .icon-svg,
.record-delete-btn .icon-svg,
.category-btn .icon-svg,
.cat-icon-picker-btn .icon-svg {
  display: block;
}

/* ===== 完成提示 Toast ===== */
.toast {
  position: fixed;
  top: calc(env(safe-area-inset-top) + 16px);
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--bg-card);
  color: var(--text-main);
  padding: 10px 18px;
  border-radius: 10px;
  font-size: 0.9rem;
  opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 200;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== 明細查詢頁:篩選膠囊 ===== */
.filter-chips {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  padding-bottom: 4px;
  margin-bottom: 1rem;
}
.filter-chip {
  flex: none;
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border: none;
  border-radius: 999px;
  color: var(--text-muted);
  padding: 6px 14px;
  font-size: 0.85rem;
  white-space: nowrap;
}
.filter-chip.active {
  background: var(--accent);
  color: #fff;
}

.category-filter-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  color: var(--text-main);
  border-radius: 999px;
  padding: 5px 10px 5px 14px;
  font-size: 0.85rem;
  margin-bottom: 1rem;
}
.category-filter-tag button {
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 1rem;
  line-height: 1;
  padding: 0 4px;
}

/* ===== 明細查詢頁:日期分組列表 ===== */
.day-group { margin-bottom: 1.25rem; }
.day-group-header {
  display: flex;
  justify-content: space-between;
  color: var(--text-muted);
  font-size: 0.8rem;
  margin-bottom: 6px;
  padding: 0 4px;
}

.record-row {
  position: relative;
  overflow: hidden;
  border-radius: 10px;
  margin-bottom: 6px;
}
.record-row-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  padding: 0.75rem 1rem;
  transform: translateX(0);
  transition: transform 0.15s ease;
  touch-action: pan-y;
  position: relative;
  z-index: 1;
}
.record-row-content.swiped { transform: translateX(-72px); }
.record-cat { font-size: 0.95rem; }
.record-amount { font-size: 0.95rem; font-weight: 500; }
.record-note {
  /* 用 text-muted 變數而不是寫死顏色,深色/淺色模式都會自動對比足夠 */
  color: var(--text-muted);
  font-size: 0.85rem;
  margin-left: 4px;
}
.record-delete-btn {
  position: absolute;
  top: 0;
  right: 0;
  width: 72px;
  height: 100%;
  background: #d9463d;
  color: #fff;
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 0;
}

.empty-hint {
  color: var(--text-muted);
  text-align: center;
  padding: 2rem 0;
  font-size: 0.9rem;
}

/* ===== 統計頁:月份切換 ===== */
.month-nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 1.5rem;
  margin-bottom: 1rem;
  font-size: 1rem;
}
.month-nav-btn {
  background: var(--bg-card);
  border: none;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  color: var(--text-main);
  font-size: 1.1rem;
  line-height: 1;
  padding: 0;
}
.month-nav-btn:active { background: var(--bg-card-hover); }

/* ===== 統計頁:本月總支出卡片 ===== */
.stats-total-card {
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border-radius: 12px;
  padding: 1rem;
  text-align: center;
  margin-bottom: 1.25rem;
}
.stats-total-label {
  color: var(--text-muted);
  font-size: 0.8rem;
  margin: 0 0 4px;
}
.stats-total-value {
  font-size: 1.6rem;
  font-weight: 500;
  margin: 0;
}

/* ===== 統計頁:分類長條圖(水平長條,適合窄螢幕) ===== */
.stat-bar-row {
  margin-bottom: 14px;
  cursor: pointer;
}
.stat-bar-labels {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  margin-bottom: 5px;
}
.stat-bar-track {
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border-radius: 6px;
  height: 10px;
  overflow: hidden;
}
.stat-bar-fill {
  background: var(--accent);
  height: 100%;
  border-radius: 6px;
  transition: width 0.2s ease;
}

/* ===== 分類管理頁 ===== */
.cat-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border-radius: 10px;
  padding: 0.6rem 0.75rem;
  margin-bottom: 6px;
  gap: 8px;
}
.cat-name {
  font-size: 0.95rem;
  flex: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.cat-row-actions {
  display: flex;
  align-items: center;
  gap: 4px;
  flex: none;
}
.cat-icon-btn {
  height: 36px;
  min-width: 32px;
  box-sizing: border-box;
  display: flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 0.85rem;
  padding: 0 6px;
  border-radius: 6px;
}
.cat-icon-btn .icon-svg { width: 18px; height: 18px; }
.cat-icon-btn:active { background: var(--bg-card-hover); }
.cat-icon-btn.danger { color: #e8837d; }
.cat-icon-btn:disabled { opacity: 0.3; }

.cat-row .cat-edit-input {
  height: 36px;
  box-sizing: border-box;
  margin-bottom: 0;
  flex: 1;
  min-width: 0;
  background: var(--bg-app);
  border: 0.5px solid var(--border-subtle);
  border-radius: 8px;
  color: var(--text-main);
  padding: 0 8px;
  font-size: 0.95rem;
}

.cat-add-row {
  display: flex;
  align-items: stretch;
  gap: 8px;
  margin-top: 0.5rem;
}
.cat-add-row input,
.cat-submit-btn {
  height: 42px;
  box-sizing: border-box;
  font-size: 0.95rem;
  border-radius: 8px;
}
.cat-add-row input {
  flex: 1;
  min-width: 0;
  background: var(--bg-card);
  border: 0.5px solid var(--border-subtle);
  color: var(--text-main);
  padding: 0 12px;
}
.cat-submit-btn {
  background: var(--accent);
  color: #fff;
  border: 0.5px solid transparent;
  padding: 0;
  width: 42px;
  flex: none;
  display: flex;
  align-items: center;
  justify-content: center;
}
.cat-submit-btn .icon-svg { width: 20px; height: 20px; }

/* ===== 橫向鎖定提示遮罩 ===== */
.rotate-lock-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: var(--bg-app);
  z-index: 999;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0.5rem;
  color: var(--text-muted);
  font-size: 1rem;
  text-align: center;
  padding: 1rem;
}
.rotate-lock-overlay p:first-child { font-size: 2.5rem; margin: 0; }

@media (orientation: landscape) {
  .rotate-lock-overlay { display: flex; }
  /* 橫向時把底下所有操作內容藏起來,避免使用者透過遮罩縫隙誤觸 */
  main.app-content, nav.bottom-tabs, .amount-modal {
    display: none !important;
  }
}

/* ===== 設定頁 ===== */
.settings-row {
  background: var(--card-surface);
  backdrop-filter: var(--card-blur);
  -webkit-backdrop-filter: var(--card-blur);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  margin-bottom: 10px;
}
.settings-row-label {
  font-size: 0.85rem;
  color: var(--text-muted);
  margin: 0 0 8px;
}
.segmented {
  display: flex;
  background: var(--bg-app);
  border-radius: 8px;
  padding: 3px;
  gap: 2px;
}
.segmented-btn {
  flex: 1;
  background: none;
  border: none;
  color: var(--text-muted);
  font-size: 0.85rem;
  padding: 7px 0;
  border-radius: 6px;
  text-align: center;
}
.segmented-btn.active {
  background: var(--accent);
  color: #fff;
}

/* ===== 登入 / 註冊畫面 ===== */
.auth-screen {
  position: fixed;
  inset: 0;
  background: var(--bg-app);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
  z-index: 500;
}
.auth-card {
  width: 100%;
  max-width: 340px;
}
.auth-title {
  text-align: center;
  font-size: 1.3rem;
  font-weight: 600;
  margin: 0 0 1.25rem;
}
.auth-mode-switch { margin-bottom: 1.25rem; }
.auth-form {
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.auth-form input {
  background: var(--bg-card);
  border: 0.5px solid var(--border-subtle);
  border-radius: 10px;
  color: var(--text-main);
  padding: 0.75rem 1rem;
  font-size: 0.95rem;
}
.auth-submit-btn {
  width: 100%;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 0.75rem 0;
  font-size: 1rem;
  font-weight: 500;
  margin-top: 4px;
}
.auth-error {
  color: #e8837d;
  font-size: 0.85rem;
  text-align: center;
  min-height: 1.2rem;
  margin: 10px 0 0;
}

/* ===== 雲端同步設定 ===== */
.gist-hint {
  font-size: 0.8rem;
  color: var(--text-muted);
  margin: 0 0 8px;
  line-height: 1.5;
}
.gist-token-input {
  width: 100%;
  background: var(--bg-app);
  border: 0.5px solid var(--border-subtle);
  border-radius: 8px;
  color: var(--text-main);
  padding: 8px 10px;
  font-size: 0.9rem;
  margin-bottom: 8px;
}
.gist-btn-row { display: flex; gap: 8px; flex-wrap: wrap; }
.gist-btn {

  color: #fff;

.gist-btn.secondary { background: var(--bg-app); color: var(--text-main); }

/* ===== 背景圖片設定 ===== */

.visually-hidden {

  padding: 0;

<script>
/*
  ===== 禁止縮放:雙擊放大 / 雙指縮放 =====
  這裡跟 <meta viewport> 與 CSS touch-action 是兩層保險,
  因為不同 iOS/瀏覽器版本對前者的支援程度不一,加上這層 JS 判斷更保險。
  (原本還有一層用 touchend 時間差判斷雙擊放大的邏輯,會誤傷快速連點按鈕的操作,已移除)
*/

// Safari 專屬的手勢事件(雙指縮放會觸發這組事件),直接攔截取消
document.addEventListener("gesturestart", (e) => e.preventDefault());
document.addEventListener("gesturechange", (e) => e.preventDefault());
document.addEventListener("gestureend", (e) => e.preventDefault());

/*
  ===== 架構說明 =====
  這份檔案採「單頁多 section」模式:
  - 每個分頁是一個 <section data-page="xxx">,平常都存在於 DOM 中,只是用 CSS 隱藏
  - 點擊底部分頁按鈕時,只切換 active class,不做頁面重新載入
  - 之後要新增功能只要:
      1. 在 main 裡新增一個 <section data-page="新頁面">
      2. 在 bottom-tabs 裡新增對應的 <button data-target="新頁面">
    兩邊的 data-page / data-target 值要一致,JS 完全不用改
*/

const tabs = document.querySelectorAll(".tab-btn");
const pages = document.querySelectorAll("section[data-page]");

function switchPage(target) {
  pages.forEach(p => p.classList.toggle("active", p.dataset.page === target));
  tabs.forEach(t => t.classList.toggle("active", t.dataset.target === target));
  // 每次切到明細頁都重新讀取資料,確保剛記的帳馬上看得到
  if (target === "list") renderRecordList();
  if (target === "stats") renderStats();
  if (target === "categories") renderCategoryManageList();
  if (target === "settings") { renderGistSyncUI(); renderBgSettingsUI(); }
}

document.getElementById("bottomTabs").addEventListener("click", (e) => {
  const btn = e.target.closest(".tab-btn");
  if (!btn) return;
  switchPage(btn.dataset.target);
});

/*
  ===== 帳號系統 =====
  currentEmail 決定目前是「誰」在用這支手機,
  所有記帳資料、分類資料都用 email 當作 key 的一部分,彼此完全獨立不互通。
*/
let currentEmail = null;

function categoriesKey() { return `ledger_categories::${currentEmail}`; }
function recordsKey() { return `ledger_records::${currentEmail}`; }
const BG_IMAGE_KEY_PREFIX = "ledger_bg_image";
function bgImageKey() { return `${BG_IMAGE_KEY_PREFIX}::${currentEmail}`; }

/*
  ===== 分類資料 =====
  存放在 localStorage(依帳號區隔),由「分類管理頁」新增/編輯/刪除/排序,
  記帳輸入頁的九宮格、統計頁、明細頁全部讀取同一份資料,不會各自維護一份。
*/
const DEFAULT_CATEGORIES = [
  { id: "food", name: "飲食", icon: "bowl" },
  { id: "transport", name: "交通", icon: "bus" },
  { id: "drink", name: "飲料", icon: "cup" }
];

/*
  ===== 分類圖示定義(內嵌 SVG 線條圖示)=====
  不用外部圖示字型 CDN,SVG 路徑直接寫在程式碼裡,離線也能顯示,
  風格統一的單色線條,而且顏色會跟著目前的深色/淺色主題走(用 currentColor)。
  每個 icon 只存一組 key(例如 "bowl"),實際圖形定義集中在這裡,
  九宮格、分類管理頁、圖示選擇器都從同一份定義讀取,不會各自維護。
*/
const ICON_DEFS = [
  { key: "bowl", label: "飲食", path: '<path d="M3 12h18a8 8 0 0 1-8 8h-2a8 8 0 0 1-8-8z"/><path d="M8 7c0 .9-.9.9-.9 1.8M12 6c0 .9-.9.9-.9 1.8M16 7c0 .9-.9.9-.9 1.8"/>' },

/*

  跟上面的分類圖示分開放,這組不會出現在「分類圖示選擇器」的清單裡,
  純粹給按鈕本身當作圖示用,取代原本的文字。
*/
const UI_ICON_DEFS = [
  { key: "trash", path: '<path d="M4 7h16"/><path d="M9 7V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v3"/><path d="M6 7l1 13a2 2 0 0 0 2 2h6a2 2 0 0 0 2-2l1-13"/><path d="M10 11v6M14 11v6"/>' },
  { key: "pencil", path: '<path d="M4 20l4-1 11-11a2 2 0 0 0-3-3L5 16l-1 4z"/><path d="M13 6l3 3"/>' },
  { key: "check", path: '<path d="M4 12l5 5L20 6"/>' },
  { key: "x", path: '<path d="M5 5l14 14M19 5L5 19"/>' },
  { key: "plus", path: '<path d="M12 4v16M4 12h16"/>' }
];

function getIconDef(key) {
  return ICON_DEFS.find(i => i.key === key) || UI_ICON_DEFS.find(i => i.key === key);
}

// 組出一個 <svg><use> 標籤,實際圖形定義在共用的 sprite 裡(見 buildIconSprite)
function iconSvgTag(key, cssClass) {
  if (!key || !getIconDef(key)) return "";
  return `<svg class="icon-svg ${cssClass || ""}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><use href="#icon-${key}"></use></svg>`;
}

// 把所有圖示定義組成一份隱藏的 SVG sprite,插入頁面一次,之後全部用 <use> 參照,不重複定義路徑
function buildIconSprite() {
  const allDefs = [...ICON_DEFS, ...UI_ICON_DEFS];
  const symbols = allDefs.map(i => `<symbol id="icon-${i.key}" viewBox="0 0 24 24">${i.path}</symbol>`).join("");
  const sprite = document.createElement("div");
  sprite.style.display = "none";
  sprite.innerHTML = `<svg>${symbols}</svg>`;
  document.body.appendChild(sprite);
}
buildIconSprite();

/*
  ===== 本地資料庫(依帳號區隔,先用 localStorage,之後可以再加 Gist 同步) =====
*/
function loadRecords() {
  const raw = localStorage.getItem(recordsKey());
  return raw ? JSON.parse(raw) : [];
}

function saveRecord(record) {
  const records = loadRecords();
  records.push(record);
  localStorage.setItem(recordsKey(), JSON.stringify(records));
}

function makeRecordId(date) {
  const datePart = toLocalDateString(date).replace(/-/g, "");
  const randPart = Math.random().toString(36).slice(2,6);
  return `${datePart}-${randPart}`;
}

// 用本地時區組出 YYYY-MM-DD,不要用 toISOString(它會先轉成 UTC,
// 在台灣這種 UTC+8 時區,凌晨時段用 toISOString 算出來的日期可能會早一天,
// 補記過去帳目時如果日期算錯就完全失去補記的意義)
function toLocalDateString(date) {
  const y = date.getFullYear();
  const m = String(date.getMonth() + 1).padStart(2, "0");
  const d = String(date.getDate()).padStart(2, "0");
  return `${y}-${m}-${d}`;
}

function addRecord(amount, categoryId, customDate) {
  const now = new Date();
  let effectiveDate = now;
  if (customDate) {
    // 只採用使用者選的年/月/日,時分秒仍用目前的即時時間,
    // 這樣同一天補記好幾筆時,彼此還是能依時間先後排序
    effectiveDate = new Date(customDate);
    effectiveDate.setHours(now.getHours(), now.getMinutes(), now.getSeconds(), now.getMilliseconds());
  }
  const record = {
    id: makeRecordId(effectiveDate),
    ts: Math.floor(effectiveDate.getTime() / 1000),
    date: toLocalDateString(effectiveDate),
    amount: amount,
    categoryId: categoryId,
    note: ""
  };
  saveRecord(record);
  return record;
}

function findLastRecordByCategory(categoryId) {
  const records = loadRecords();
  for (let i = records.length - 1; i >= 0; i--) {
    if (records[i].categoryId === categoryId) return records[i];
  }
  return null;
}

function findCategory(id) {
  return categories.find(c => c.id === id);

function updateDateChipLabel() {
  const chip = document.getElementById("dateChipBtn");
  if (!selectedRecordDate) {
    chip.textContent = "今天";
    return;
  }
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const sel = new Date(selectedRecordDate);
  sel.setHours(0, 0, 0, 0);
  const diffDays = Math.round((today - sel) / 86400000);
  if (diffDays === 0) chip.textContent = "今天";
  else if (diffDays === 1) chip.textContent = "昨天";
  else if (diffDays === 2) chip.textContent = "前天";
  else chip.textContent = `${sel.getMonth() + 1}/${sel.getDate()}`;
}

function openAmountModal(categoryId) {
  currentCategory = findCategory(categoryId);
  inputBuffer = "";
  selectedRecordDate = null; // 每次重新點開分類,預設都回到「今天」,避免不小心延用上一筆的補記日期
  amountSheetCat.textContent = currentCategory.name;
  updateAmountDisplay();
  updateDateChipLabel();
  document.getElementById("dateOptionsRow").style.display = "none";
  amountModal.classList.add("open");
}

function closeAmountModal() {
  amountModal.classList.remove("open");
  currentCategory = null;
  inputBuffer = "";
  selectedRecordDate = null;
}

function updateAmountDisplay() {
  if (inputBuffer === "") {
    amountDisplay.textContent = "輸入金額";
    amountDisplay.classList.add("placeholder");
    confirmBtn.disabled = true;
  } else {
    amountDisplay.textContent = `$${inputBuffer}`;
    amountDisplay.classList.remove("placeholder");
    confirmBtn.disabled = false;
  }
}

function renderQuickAmounts() {
  quickAmountsEl.innerHTML = "";
  quickAmounts.forEach(amount => {
    const btn = document.createElement("button");
    btn.className = "quick-amount-btn";
    btn.textContent = `+$${amount}`;
    // 每按一次疊加金額,不會關閉輸入視窗,方便連續點擊湊出金額
    btn.addEventListener("click", () => incrementAmount(amount));
    quickAmountsEl.appendChild(btn);
  });
}

function incrementAmount(amount) {
  const current = parseInt(inputBuffer || "0", 10);
  inputBuffer = String(current + amount);
  updateAmountDisplay();
}

function submitRecord(amount) {
  if (!currentCategory) return;
  addRecord(amount, currentCategory.id, selectedRecordDate);
  const dateNote = selectedRecordDate ? `(${document.getElementById("dateChipBtn").textContent})` : "";
  showToast(`已記錄 ${currentCategory.name} $${amount}${dateNote}`);

/* 數字鍵盤點擊處理 */
document.getElementById("keypad").addEventListener("click", (e) => {
  const btn = e.target.closest(".keypad-btn");
  if (!btn) return;
  const key = btn.dataset.key;

  if (key === "back") {
    inputBuffer = inputBuffer.slice(0, -1);
    updateAmountDisplay();
    return;
  }
  if (key === "confirm") {
    const amount = parseInt(inputBuffer, 10);
    if (amount > 0) submitRecord(amount);
    return;
  }
  // 數字鍵:限制最多輸入 6 位數,避免異常大數字
  if (inputBuffer.length < 6) {
    inputBuffer += key;
    updateAmountDisplay();
  }
});

/* ===== 分類九宮格:點擊開啟金額輸入,長按複製上一筆同分類記錄 ===== */
const LONG_PRESS_MS = 550;

function renderCategoryGrid() {
  const grid = document.getElementById("categoryGrid");
  grid.innerHTML = "";
  categories.forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "category-btn";
    const iconTag = iconSvgTag(cat.icon, "category-icon");
    btn.innerHTML = iconTag
      ? `${iconTag}<span>${cat.name}</span>`
      : `<span>${cat.name}</span>`;

    let pressTimer = null;
    let longPressFired = false;

    const startPress = () => {
      longPressFired = false;
      pressTimer = setTimeout(() => {
        longPressFired = true;
        const last = findLastRecordByCategory(cat.id);
        if (last) {
          addRecord(last.amount, cat.id);
          showToast(`已複製上一筆 ${cat.name} $${last.amount}`);
        } else {
          openAmountModal(cat.id); // 沒有歷史紀錄時,退回一般輸入流程
        }
      }, LONG_PRESS_MS);
    };
    const cancelPress = () => clearTimeout(pressTimer);

    btn.addEventListener("pointerdown", startPress);
    btn.addEventListener("pointerup", cancelPress);
    btn.addEventListener("pointerleave", cancelPress);
    btn.addEventListener("click", () => {
      if (longPressFired) return; // 長按已經處理過,單擊事件不再重複觸發
      openAmountModal(cat.id);
    });

    grid.appendChild(btn);
  });
}

/*
  ===== 明細查詢頁 =====
  串接同一份 loadRecords() 資料,依篩選條件過濾、依日期分組、算每日小計
*/
let currentFilter = "all";
let categoryFilter = null;   // 從統計頁點長條圖進來時,會設定這個值
let filterMonthDate = null;  // 從統計頁點長條圖進來時,鎖定當時檢視的月份

function isInMonth(ts, now) {
  const d = new Date(ts * 1000);
  return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
}
function isInWeek(ts, now) {
  const d = new Date(ts * 1000);
  const day = now.getDay() === 0 ? 7 : now.getDay(); // 週一為第1天
  const monday = new Date(now);
  monday.setHours(0,0,0,0);
  monday.setDate(now.getDate() - (day - 1));
  return d >= monday;
}

function filterRecords(records) {
  let result = records;
  if (categoryFilter) result = result.filter(r => r.categoryId === categoryFilter);

  // 從統計頁點進來的月份鎖定,優先於一般的全部/本月/本週篩選膠囊
  if (filterMonthDate) return result.filter(r => isInStatsMonth(r.ts, filterMonthDate));

  if (currentFilter === "all") return result;
  const now = new Date();
  if (currentFilter === "month") return result.filter(r => isInMonth(r.ts, now));
  if (currentFilter === "week") return result.filter(r => isInWeek(r.ts, now));
  return result;
}

function groupByDate(records) {
  // 依 ts 由新到舊排序,再依 date 分組
  const sorted = [...records].sort((a, b) => b.ts - a.ts);
  const groups = [];
  const map = {};
  sorted.forEach(r => {
    if (!map[r.date]) {
      map[r.date] = { date: r.date, records: [], total: 0 };
      groups.push(map[r.date]);
    }
    map[r.date].records.push(r);
    map[r.date].total += r.amount;
  });
  return groups;
}

function formatDateLabel(dateStr) {
  const d = new Date(dateStr + "T00:00:00");
  const weekDays = ["日","一","二","三","四","五","六"];
  return `${dateStr.slice(5)} 週${weekDays[d.getDay()]}`;
}

  chipsEl.style.display = filterMonthDate ? "none" : "";

  const monthText = filterMonthDate
    ? ` · ${filterMonthDate.getFullYear()}年${filterMonthDate.getMonth() + 1}月`
    : "";

  el.innerHTML = `
    <span class="category-filter-tag">
      篩選:${catNameOf(categoryFilter)}${monthText}
      <button id="clearCategoryFilterBtn" aria-label="清除分類篩選">✕</button>
    </span>
  `;
  document.getElementById("clearCategoryFilterBtn").addEventListener("click", () => {
    categoryFilter = null;
    filterMonthDate = null;
    renderRecordList();
  });
}

function renderRecordList() {
  renderCategoryFilterTag();
  const container = document.getElementById("recordListContainer");
  const records = filterRecords(loadRecords());

  if (records.length === 0) {
    container.innerHTML = `<p class="empty-hint">這個範圍內還沒有記帳紀錄</p>`;
    return;
  }

  const groups = groupByDate(records);
  container.innerHTML = "";

  groups.forEach(group => {
    const groupEl = document.createElement("div");
    groupEl.className = "day-group";
    groupEl.innerHTML = `
      <div class="day-group-header">
        <span>${formatDateLabel(group.date)}</span>
        <span>小計 $${group.total}</span>
      </div>
    `;

    group.records.forEach(r => {
      const row = document.createElement("div");
      row.className = "record-row";
      const noteHtml = r.note
        ? `<span class="record-note">· ${escapeHtml(r.note)}</span>`
        : "";
      row.innerHTML = `
        <div class="record-row-content">
          <span class="record-cat">${catNameOf(r.categoryId)}${noteHtml}</span>
          <span class="record-amount">$${r.amount}</span>
        </div>
        <button class="record-delete-btn" aria-label="刪除">${iconSvgTag("trash")}</button>
      `;

      const content = row.querySelector(".record-row-content");
      const deleteBtn = row.querySelector(".record-delete-btn");

      // 左滑顯示刪除鍵;右滑在收合狀態下開啟備註編輯,已展開時右滑則是收回
      let startX = 0;
      let dragging = false;

      content.addEventListener("pointerdown", (e) => {
        startX = e.clientX;
        dragging = true;
      });
      content.addEventListener("pointerup", (e) => {
        if (!dragging) return;
        dragging = false;
        const diff = e.clientX - startX;
        if (diff < -30) {
          content.classList.add("swiped");
        } else if (diff > 30) {
          if (content.classList.contains("swiped")) {
            content.classList.remove("swiped");
          } else {
            openNoteModal(r.id);
          }
        }
      });
      // 點擊已滑開的列,先收回而不是誤觸其他動作
      content.addEventListener("click", () => {
        if (content.classList.contains("swiped")) {
          content.classList.remove("swiped");
        }
      });

      deleteBtn.addEventListener("click", () => deleteRecord(r.id));

      groupEl.appendChild(row);
    });

    container.appendChild(groupEl);
  });
}

document.getElementById("filterChips").addEventListener("click", (e) => {
  const chip = e.target.closest(".filter-chip");
  if (!chip) return;
  currentFilter = chip.dataset.filter;
  categoryFilter = null;
  filterMonthDate = null;
  document.querySelectorAll(".filter-chip").forEach(c => c.classList.toggle("active", c === chip));
  renderRecordList();
});

/*
  ===== 統計頁 =====
  串接同一份 loadRecords() 資料,依「目前檢視的月份」加總各分類金額
*/
let statsMonthOffset = 0; // 0 = 本月,-1 = 上個月,+1 = 下個月(禁止超過本月)

function getStatsMonthDate() {
  const d = new Date();
  d.setDate(1); // 避免跨月時日期溢位(例如31號減一個月會跳兩個月)
  d.setMonth(d.getMonth() + statsMonthOffset);
  return d;
}

function isInStatsMonth(ts, monthDate) {
  const d = new Date(ts * 1000);
  return d.getFullYear() === monthDate.getFullYear() && d.getMonth() === monthDate.getMonth();
}

function computeCategoryTotals(records) {
  const totals = {};
  records.forEach(r => {
    totals[r.categoryId] = (totals[r.categoryId] || 0) + r.amount;
  });
  // 依金額由大到小排序,花最多的分類排最上面
  return Object.entries(totals)
    .map(([categoryId, amount]) => ({ categoryId, amount }))
    .sort((a, b) => b.amount - a.amount);
}

function renderStats() {
  const monthDate = getStatsMonthDate();
  document.getElementById("monthLabel").textContent =
    `${monthDate.getFullYear()}年${monthDate.getMonth() + 1}月`;

  // 下個月按鈕:不能超過目前這個月
  const now = new Date();
  const isCurrentMonth = monthDate.getFullYear() === now.getFullYear() && monthDate.getMonth() === now.getMonth();
  document.getElementById("nextMonthBtn").disabled = isCurrentMonth;

  const monthRecords = loadRecords().filter(r => isInStatsMonth(r.ts, monthDate));
  const total = monthRecords.reduce((sum, r) => sum + r.amount, 0);
  document.getElementById("statsTotalValue").textContent = `$${total}`;

  const catTotals = computeCategoryTotals(monthRecords);
  const barsEl = document.getElementById("statsBars");
  barsEl.innerHTML = "";

  if (catTotals.length === 0) {
    barsEl.innerHTML = `<p class="empty-hint">這個月還沒有記帳紀錄</p>`;
    return;
  }

  const maxAmount = catTotals[0].amount;

  catTotals.forEach(item => {
    const row = document.createElement("div");
    row.className = "stat-bar-row";
    const widthPercent = Math.round((item.amount / maxAmount) * 100);
    row.innerHTML = `
      <div class="stat-bar-labels">
        <span>${catNameOf(item.categoryId)}</span>
        <span>$${item.amount}</span>
      </div>
      <div class="stat-bar-track">
        <div class="stat-bar-fill" style="width:${widthPercent}%"></div>
      </div>
    `;
    // 點長條 = 跳到明細頁,只看「這個月 + 這個分類」的紀錄
    row.addEventListener("click", () => {
      categoryFilter = item.categoryId;
      filterMonthDate = getStatsMonthDate();
      switchPage("list");
    });
    barsEl.appendChild(row);
  });
}

document.getElementById("prevMonthBtn").addEventListener("click", () => {
  statsMonthOffset -= 1;
  renderStats();
});
document.getElementById("nextMonthBtn").addEventListener("click", () => {
  if (statsMonthOffset < 0) {
    statsMonthOffset += 1;
    renderStats();
  }
});

/*
  ===== 分類管理頁 =====
  對 categories 陣列做增/刪/改/排序,存回 localStorage,
  並重新渲染記帳輸入頁的九宮格,確保兩邊永遠是同一份資料。
*/
let editingCategoryId = null; // 目前正在編輯名稱的分類 id,null 代表沒有在編輯
let editingIconValue = "";    // 編輯中的分類,目前選擇的圖示
let newCategoryIcon = "";     // 新增分類表單,目前選擇的圖示
let iconPickerTarget = null;  // 圖示選擇視窗是給 "new"(新增)還是 "edit"(編輯中的列)用

function persistCategoriesAndSync() {
  saveCategories(categories);
  renderCategoryGrid();     // 同步更新記帳輸入頁的九宮格
  renderCategoryManageList(); // 重新渲染本頁清單
}

function moveCategory(id, direction) {
  const index = categories.findIndex(c => c.id === id);
  const targetIndex = direction === "up" ? index - 1 : index + 1;
  if (targetIndex < 0 || targetIndex >= categories.length) return;
  [categories[index], categories[targetIndex]] = [categories[targetIndex], categories[index]];
  persistCategoriesAndSync();
}

function startEditCategory(id) {
  editingCategoryId = id;
  const cat = findCategory(id);
  editingIconValue = (cat && cat.icon) || "";
  renderCategoryManageList();
}

function cancelEditCategory() {
  editingCategoryId = null;
  editingIconValue = "";
  renderCategoryManageList();
}

function saveEditCategory(id, newName) {
  const trimmed = newName.trim();
  if (!trimmed) {
    showToast("名稱不能是空白");
    return;
  }
  const cat = findCategory(id);
  cat.name = trimmed;
  cat.icon = editingIconValue;
  editingCategoryId = null;
  persistCategoriesAndSync();
  showToast("分類已更新");
}

function deleteCategory(id) {
  if (categories.length <= 1) {
    showToast("至少要保留一個分類");
    return;
  }
  if (!confirm(`確定要刪除「${catNameOf(id)}」這個分類嗎?`)) return;
  categories = categories.filter(c => c.id !== id);
  persistCategoriesAndSync();
  showToast("分類已刪除");
}

function addCategory(name) {
  const trimmed = name.trim();
  if (!trimmed) {
    showToast("請輸入分類名稱");
    return;
  }
  categories.push({ id: makeCategoryId(), name: trimmed, icon: newCategoryIcon });
  persistCategoriesAndSync();
  document.getElementById("newCategoryInput").value = "";
  newCategoryIcon = "";
  document.getElementById("newCategoryIconBtn").innerHTML = "➕";
  showToast("已新增分類");
}

function renderCategoryManageList() {
  const listEl = document.getElementById("categoryManageList");
  listEl.innerHTML = "";

  categories.forEach((cat, index) => {
    const row = document.createElement("div");
    row.className = "cat-row";

    if (editingCategoryId === cat.id) {
      // 編輯狀態:名稱換成輸入框,多一顆圖示按鈕,操作鍵換成儲存/取消
      const editIconTag = iconSvgTag(editingIconValue, "cat-icon-preview") || "➕";
      row.innerHTML = `
        <button type="button" class="cat-icon-picker-btn" id="editIconBtn">${editIconTag}</button>
        <input type="text" class="cat-edit-input" value="${cat.name}" maxlength="10">
        <div class="cat-row-actions">
          <button class="cat-icon-btn" data-action="save" aria-label="儲存">${iconSvgTag("check")}</button>
          <button class="cat-icon-btn" data-action="cancel" aria-label="取消">${iconSvgTag("x")}</button>
        </div>
      `;
      const input = row.querySelector(".cat-edit-input");
      row.querySelector("#editIconBtn").addEventListener("click", () => openIconPicker("edit"));
      row.querySelector('[data-action="save"]').addEventListener("click", () => saveEditCategory(cat.id, input.value));
      row.querySelector('[data-action="cancel"]').addEventListener("click", cancelEditCategory);
      // Enter 鍵直接儲存,減少一次點擊
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") saveEditCategory(cat.id, input.value);
      });
    } else {
      const iconTag = iconSvgTag(cat.icon, "cat-icon");
      row.innerHTML = `
        <span class="cat-name">${iconTag}${cat.name}</span>
        <div class="cat-row-actions">
          <button class="cat-icon-btn" data-action="up" ${index === 0 ? "disabled" : ""}>▲</button>
          <button class="cat-icon-btn" data-action="down" ${index === categories.length - 1 ? "disabled" : ""}>▼</button>
          <button class="cat-icon-btn" data-action="edit" aria-label="編輯">${iconSvgTag("pencil")}</button>
          <button class="cat-icon-btn danger" data-action="delete" aria-label="刪除">${iconSvgTag("trash")}</button>
        </div>
      `;
      row.querySelector('[data-action="up"]').addEventListener("click", () => moveCategory(cat.id, "up"));
      row.querySelector('[data-action="down"]').addEventListener("click", () => moveCategory(cat.id, "down"));
      row.querySelector('[data-action="edit"]').addEventListener("click", () => startEditCategory(cat.id));
      row.querySelector('[data-action="delete"]').addEventListener("click", () => deleteCategory(cat.id));
    }

    listEl.appendChild(row);
  });
}

document.getElementById("addCategoryBtn").addEventListener("click", () => {
  addCategory(document.getElementById("newCategoryInput").value);
});
document.getElementById("newCategoryInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") addCategory(e.target.value);

/*
  ===== 分類圖示選擇彈出視窗 =====
*/
function openIconPicker(target) {
  iconPickerTarget = target;
  const grid = document.getElementById("iconPickerGrid");
  grid.innerHTML = "";

  const noneBtn = document.createElement("button");
  noneBtn.type = "button";
  noneBtn.className = "icon-picker-btn";

  noneBtn.addEventListener("click", () => selectIcon(""));

  ICON_DEFS.forEach(def => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "icon-picker-btn";
    btn.innerHTML = `${iconSvgTag(def.key)}<span class="icon-picker-label">${def.label}</span>`;
    btn.addEventListener("click", () => selectIcon(def.key));
    grid.appendChild(btn);
  });

  document.getElementById("iconPickerModal").classList.add("open");
}

function closeIconPicker() {
  document.getElementById("iconPickerModal").classList.remove("open");
  iconPickerTarget = null;
}

function selectIcon(iconKey) {
  if (iconPickerTarget === "new") {
    newCategoryIcon = iconKey;
    document.getElementById("newCategoryIconBtn").innerHTML = iconSvgTag(iconKey, "cat-icon-preview") || "➕";
  } else if (iconPickerTarget === "edit") {
    editingIconValue = iconKey;
    renderCategoryManageList(); // 重新渲染,讓編輯列上的圖示按鈕顯示新選擇
  }
  closeIconPicker();
}

document.getElementById("iconPickerClose").addEventListener("click", closeIconPicker);
document.getElementById("iconPickerModal").addEventListener("click", (e) => {

/*
  ===== 設定頁:外觀主題 / 文字大小 =====
  實際套用邏輯已經寫在 <head> 最前面的行內 script(避免開啟時畫面閃一下),
  這裡只負責:切換時即時套用 + 記住選擇 + 更新按鈕的選中樣式。
*/
const FONT_SCALE_STEPS = { "1": 87.5, "2": 93.75, "3": 100, "4": 112.5, "5": 125 };

function applyTheme(value) {
  localStorage.setItem("ledger_theme", value);
  document.documentElement.setAttribute("data-theme", value);
  document.querySelectorAll("#themeSegmented .segmented-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.value === value)
  );
  applyCardStyle(); // 「跟隨主題」的卡片樣式要跟著重新計算
}

function applyFontScale(value) {
  localStorage.setItem("ledger_font_scale", value);
  document.documentElement.style.fontSize = FONT_SCALE_STEPS[value] + "%";
  document.querySelectorAll("#fontScaleSegmented .segmented-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.value === value)
  );
}

document.getElementById("themeSegmented").addEventListener("click", (e) => {
  const btn = e.target.closest(".segmented-btn");
  if (btn) applyTheme(btn.dataset.value);
});

document.getElementById("fontScaleSegmented").addEventListener("click", (e) => {
  const btn = e.target.closest(".segmented-btn");
  if (btn) applyFontScale(btn.dataset.value);
});

/*
  ===== 設定頁:卡片透明度 / 玻璃樣式 =====
  「跟隨主題」模式下,卡片底色會用目前深色/淺色主題本來的卡片顏色;
  選「白玻璃」「黑玻璃」則不管目前是深色或淺色模式,強制套用白色或黑色的半透明底色。
  透明度低於 100% 時額外加上 backdrop-filter 模糊,做出真正的毛玻璃質感。
*/
const CARD_OPACITY_KEY = "ledger_card_opacity";
const CARD_GLASS_KEY = "ledger_card_glass";

function computeCardSurfaceRgb(glass) {
  if (glass === "white") return "255,255,255";
  if (glass === "black") return "0,0,0";
  const isDark = document.documentElement.getAttribute("data-theme") === "dark";
  return isDark ? "44,44,46" : "255,255,255";
}

function applyCardStyle() {
  const glass = localStorage.getItem(CARD_GLASS_KEY) || "auto";
  const opacity = parseInt(localStorage.getItem(CARD_OPACITY_KEY) || "100", 10);
  const alpha = opacity / 100;
  const rgb = computeCardSurfaceRgb(glass);

  document.documentElement.style.setProperty("--card-surface", `rgba(${rgb},${alpha})`);
  document.documentElement.style.setProperty("--card-blur", opacity < 100 ? "blur(14px)" : "none");

  document.querySelectorAll("#cardGlassSegmented .segmented-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.value === glass)
  );
  document.querySelectorAll("#cardOpacitySegmented .segmented-btn").forEach(btn =>
    btn.classList.toggle("active", btn.dataset.value === String(opacity))
  );
}

function setCardGlass(value) {
  localStorage.setItem(CARD_GLASS_KEY, value);
  applyCardStyle();
}

function setCardOpacity(value) {
  localStorage.setItem(CARD_OPACITY_KEY, value);
  applyCardStyle();
}

document.getElementById("cardGlassSegmented").addEventListener("click", (e) => {
  const btn = e.target.closest(".segmented-btn");
  if (btn) setCardGlass(btn.dataset.value);
});
document.getElementById("cardOpacitySegmented").addEventListener("click", (e) => {
  const btn = e.target.closest(".segmented-btn");
  if (btn) setCardOpacity(btn.dataset.value);
});

// 開啟頁面時,讓設定頁的按鈕反映目前實際生效中的設定(跟 <head> 裡讀到的值一致)
applyTheme(localStorage.getItem("ledger_theme") || "dark");
applyFontScale(localStorage.getItem("ledger_font_scale") || "3");
applyCardStyle();

/*
  ===== 帳號系統:註冊 / 登入 / 登出 / 10天內免登入 =====
  重要限制(誠實告知,不假裝這是銀行等級的安全性):
  這支 App 是純靜態網頁,沒有後端伺服器,所有驗證邏輯都在使用者手機的瀏覽器內執行。
  密碼用瀏覽器內建的 SHA-256(crypto.subtle)雜湊後才儲存,不是明文,
  但技術能力足夠的人仍有機會透過開發者工具檢查到雜湊值。
  這個強度適合「家人朋友各自在自己手機上使用、避免彼此誤看對方帳本」的情境,
  不適合當作正式對外服務的帳號系統。
*/
const ACCOUNTS_KEY = "ledger_accounts";
const SESSION_KEY = "ledger_session";
const SESSION_DAYS = 10;

function loadAccounts() {
  const raw = localStorage.getItem(ACCOUNTS_KEY);
  return raw ? JSON.parse(raw) : {};
}
function saveAccounts(accounts) {
  localStorage.setItem(ACCOUNTS_KEY, JSON.stringify(accounts));
}

// 用 email 當作雜湊的鹽(salt),讓不同帳號就算密碼相同,雜湊結果也不同
async function hashPassword(password, email) {
  const data = new TextEncoder().encode(`${email}::${password}`);
  const hashBuffer = await crypto.subtle.digest("SHA-256", data);
  return Array.from(new Uint8Array(hashBuffer))
    .map(b => b.toString(16).padStart(2, "0"))
    .join("");
}

function normalizeEmail(email) {
  return email.trim().toLowerCase();
}

function startSession(email) {
  const expiresAt = Date.now() + SESSION_DAYS * 24 * 60 * 60 * 1000;
  localStorage.setItem(SESSION_KEY, JSON.stringify({ email, expiresAt }));
}

function getValidSession() {
  const raw = localStorage.getItem(SESSION_KEY);
  if (!raw) return null;
  const session = JSON.parse(raw);
  if (Date.now() > session.expiresAt) {
    localStorage.removeItem(SESSION_KEY);
    return null;
  }
  return session;
}

function showAuthError(message) {
  document.getElementById("authError").textContent = message;
}

// 登入成功 / 已有有效 session 時,統一由這裡進入 App 主畫面
function enterApp(email) {
  currentEmail = email;
  categories = loadCategories();

  document.getElementById("authScreen").style.display = "none";
  document.getElementById("appRoot").style.display = "";
  document.getElementById("currentAccountLabel").textContent = email;

  // 背景圖片依帳號區隔,登入後套用「這個帳號」自己設定的背景(沒設定就沒有)
  applyBackgroundImage(localStorage.getItem(bgImageKey()));

  renderCategoryGrid();
  renderQuickAmounts();
  switchPage("input"); // 每次進入都回到記帳輸入頁,不記住上次停留的分頁
}

function showAuthScreen() {
  currentEmail = null;
  applyBackgroundImage(null); // 避免登出後,登入畫面還殘留上一個帳號的背景圖
  document.getElementById("appRoot").style.display = "none";
  document.getElementById("authScreen").style.display = "flex";
  document.getElementById("loginEmail").value = "";
  document.getElementById("loginPassword").value = "";
  showAuthError("");
}

async function handleRegister() {
  const email = normalizeEmail(document.getElementById("registerEmail").value);
  const password = document.getElementById("registerPassword").value;
  const passwordConfirm = document.getElementById("registerPasswordConfirm").value;

  if (!email.includes("@")) return showAuthError("請輸入正確的 Email 格式");
  if (password.length < 4) return showAuthError("密碼至少需要 4 碼");
  if (password !== passwordConfirm) return showAuthError("兩次輸入的密碼不一致");

  const accounts = loadAccounts();
  if (accounts[email]) return showAuthError("此 Email 已經註冊過,請直接登入");

  const passwordHash = await hashPassword(password, email);
  accounts[email] = { passwordHash, createdAt: Date.now() };
  saveAccounts(accounts);

  startSession(email);
  showAuthError("");
  enterApp(email);
}

async function handleLogin() {
  const email = normalizeEmail(document.getElementById("loginEmail").value);
  const password = document.getElementById("loginPassword").value;

  if (!email || !password) return showAuthError("請輸入 Email 與密碼");

  const accounts = loadAccounts();
  const account = accounts[email];
  if (!account) return showAuthError("找不到這個帳號,請先註冊");

  const passwordHash = await hashPassword(password, email);
  if (passwordHash !== account.passwordHash) return showAuthError("密碼錯誤");

  startSession(email);
  showAuthError("");
  enterApp(email);
}

function handleLogout() {
  if (!confirm("確定要登出嗎?")) return;
  localStorage.removeItem(SESSION_KEY);
  showAuthScreen();
}

// 登入/註冊 切換頁籤
document.getElementById("authModeSwitch").addEventListener("click", (e) => {
  const btn = e.target.closest(".segmented-btn");
  if (!btn) return;
  const mode = btn.dataset.mode;
  document.querySelectorAll("#authModeSwitch .segmented-btn").forEach(b =>
    b.classList.toggle("active", b === btn)
  );
  document.getElementById("loginForm").style.display = mode === "login" ? "flex" : "none";
  document.getElementById("registerForm").style.display = mode === "register" ? "flex" : "none";
  showAuthError("");
});

document.getElementById("loginSubmitBtn").addEventListener("click", handleLogin);
document.getElementById("registerSubmitBtn").addEventListener("click", handleRegister);
document.getElementById("logoutBtn").addEventListener("click", handleLogout);

// Enter 鍵直接送出,減少點擊次數
document.getElementById("loginPassword").addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleLogin();
});
document.getElementById("registerPasswordConfirm").addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleRegister();
});

/*
  ===== App 開機流程 =====
  有效 session 存在 → 直接進入主畫面,不用重新輸入密碼(10天內都是如此)
  沒有 / 過期 → 顯示登入畫面
*/
const existingSession = getValidSession();
if (existingSession) {
  enterApp(existingSession.email);
} else {
  showAuthScreen();
}

/*
  ===== 雲端同步(GitHub Gist)=====
  每個帳號(email)各自儲存自己的 Token + Gist ID,彼此獨立,
  data.json 內容涵蓋分類與記帳明細,跟本機資料結構完全一致。

  提醒:這裡存的 Personal Access Token 有讀寫你 Gist 的權限,
  存放在瀏覽器 localStorage 內,只要是同一支手機、同一個帳號登入就看得到,
  不要在公用裝置上設定這個功能。
*/
const GIST_API = "https://api.github.com/gists";
const GIST_FILENAME = "ledger-data.json";

function gistConfigKey() { return `ledger_gist_config::${currentEmail}`; }

function loadGistConfig() {
  const raw = localStorage.getItem(gistConfigKey());
  return raw ? JSON.parse(raw) : null;
}
function saveGistConfig(config) {
  localStorage.setItem(gistConfigKey(), JSON.stringify(config));
}
function clearGistConfig() {
  localStorage.removeItem(gistConfigKey());
}

function buildExportData() {
  return {
    version: 1,
    categories: categories,
    quickAmounts: quickAmounts,
    records: loadRecords()
  };
}

function applyImportData(data) {
  categories = data.categories || DEFAULT_CATEGORIES.slice();
  saveCategories(categories);
  localStorage.setItem(recordsKey(), JSON.stringify(data.records || []));
  // 重新整理目前看得到的畫面,確保還原後立刻反映最新資料
  renderCategoryGrid();
  renderRecordList();
  renderStats();
  renderCategoryManageList();
}

async function gistRequest(url, options = {}, token) {
  const res = await fetch(url, {
    ...options,
    headers: {
      "Authorization": `Bearer ${token}`,
      "Accept": "application/vnd.github+json",
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    if (res.status === 401) throw new Error("Token 無效或已過期,請重新產生一組");
    if (res.status === 404) throw new Error("找不到這個 Gist,可能已被刪除");
    throw new Error(`GitHub API 錯誤(狀態碼 ${res.status})`);
  }
  return res.json();
}

async function connectGist() {
  const token = document.getElementById("gistTokenInput").value.trim();
  if (!token) return showToast("請先貼上 Personal Access Token");

  const existing = loadGistConfig();
  document.getElementById("gistConnectBtn").disabled = true;

  try {
    if (existing && existing.gistId) {
      // 這支手機/帳號之前設定過,這次只是要驗證新 token 是否還能存取同一個 Gist
      await gistRequest(`${GIST_API}/${existing.gistId}`, {}, token);
      saveGistConfig({ ...existing, token });
      showToast("已重新連接雲端備份");
    } else {
      // 第一次設定:建立一個新的私密 Gist,內容放目前這支手機上的資料
      const body = {
        description: "快速記帳 資料備份(請勿手動修改此檔案)",
        public: false,
        files: { [GIST_FILENAME]: { content: JSON.stringify(buildExportData(), null, 2) } }
      };
      const created = await gistRequest(GIST_API, { method: "POST", body: JSON.stringify(body) }, token);
      saveGistConfig({ token, gistId: created.id, lastSyncAt: Date.now() });
      showToast("已建立雲端備份");
    }
  } catch (err) {
    showToast(err.message);
  } finally {
    document.getElementById("gistConnectBtn").disabled = false;
    renderGistSyncUI();
  }
}

async function pushToGist() {
  const config = loadGistConfig();
  if (!config) return;
  try {
    await gistRequest(`${GIST_API}/${config.gistId}`, {
      method: "PATCH",
      body: JSON.stringify({ files: { [GIST_FILENAME]: { content: JSON.stringify(buildExportData(), null, 2) } } })
    }, config.token);
    saveGistConfig({ ...config, lastSyncAt: Date.now() });
    showToast("已上傳目前資料到雲端");
  } catch (err) {
    showToast(err.message);
  }
  renderGistSyncUI();
}

async function pullFromGist() {
  const config = loadGistConfig();
  if (!config) return;
  if (!confirm("這會用雲端的資料覆蓋這支手機上目前的記帳資料,確定要繼續嗎?")) return;
  try {
    const gist = await gistRequest(`${GIST_API}/${config.gistId}`, {}, config.token);
    const file = gist.files[GIST_FILENAME];
    if (!file) throw new Error("Gist 內找不到資料檔案");
    applyImportData(JSON.parse(file.content));
    saveGistConfig({ ...config, lastSyncAt: Date.now() });
    showToast("已從雲端還原資料");
  } catch (err) {
    showToast(err.message);
  }
  renderGistSyncUI();
}

function disconnectGist() {
  if (!confirm("確定要中斷雲端同步嗎?(本機資料不會被刪除)")) return;
  clearGistConfig();
  renderGistSyncUI();
  showToast("已中斷雲端同步");
}

function renderGistSyncUI() {
  const container = document.getElementById("gistSyncContainer");
  if (!container) return; // 尚未登入、appRoot 還沒渲染時直接跳過
  const config = loadGistConfig();

  if (!config) {
    container.innerHTML = `
      <p class="gist-hint">
        貼上你的 GitHub Personal Access Token(需要 Gist 讀寫權限),
        第一次連接會自動建立一個私密 Gist 存放這個帳號的記帳資料。
      </p>
      <input type="password" class="gist-token-input" id="gistTokenInput" placeholder="ghp_xxxxxxxxxxxx">
      <div class="gist-btn-row">
        <button class="gist-btn" id="gistConnectBtn">連接雲端備份</button>
      </div>
    `;
    document.getElementById("gistConnectBtn").addEventListener("click", connectGist);
    return;
  }

  const lastSyncText = config.lastSyncAt
    ? new Date(config.lastSyncAt).toLocaleString("zh-TW")
    : "尚未同步過";

  container.innerHTML = `
    <p class="gist-status">已連接 · 上次同步:${lastSyncText}</p>
    <div class="gist-btn-row">
      <button class="gist-btn" id="gistPushBtn">上傳目前資料</button>
      <button class="gist-btn secondary" id="gistPullBtn">從雲端還原</button>
    </div>
    <div class="gist-btn-row" style="margin-top:8px">
      <button class="gist-btn danger" id="gistDisconnectBtn">中斷同步</button>
    </div>
  `;
  document.getElementById("gistPushBtn").addEventListener("click", pushToGist);
  document.getElementById("gistPullBtn").addEventListener("click", pullFromGist);
  document.getElementById("gistDisconnectBtn").addEventListener("click", disconnectGist);
}

/*
  ===== 背景圖片(依帳號區隔,key 定義移到前面 bgImageKey())=====
  照片先在本機用 canvas 壓縮縮圖(限制最長邊 1280px、JPEG 品質 0.75),
  再轉成 base64 存進 localStorage,避免原始照片檔案太大超出瀏覽器儲存上限。
*/
const BG_MAX_DIMENSION = 1280;

function applyBackgroundImage(dataUrl) {
  document.documentElement.style.setProperty(
    "--custom-bg-image",
    dataUrl ? `url("${dataUrl}")` : "none"
  );
}

function renderBgSettingsUI() {
  const stored = localStorage.getItem(bgImageKey());
  const preview = document.getElementById("bgPreviewWrap");
  const removeBtn = document.getElementById("removeBgBtn");
  if (!preview || !removeBtn) return; // appRoot 還沒渲染(尚未登入)時直接跳過

  if (stored) {
    preview.innerHTML = `<img src="${stored}" class="bg-preview-img" alt="目前背景圖片">`;
    removeBtn.style.display = "";
  } else {
    preview.innerHTML = `<p class="gist-hint">尚未設定背景圖片,套用後會以 cover 模式自動填滿畫面</p>`;
    removeBtn.style.display = "none";
  }
}

function handleBgImageFile(file) {
  const reader = new FileReader();
  reader.onerror = () => showToast("讀取檔案失敗");
  reader.onload = (e) => {
    const img = new Image();
    img.onerror = () => showToast("無法讀取這張圖片");
    img.onload = () => {
      let { width, height } = img;
      if (width > height && width > BG_MAX_DIMENSION) {
        height = Math.round(height * (BG_MAX_DIMENSION / width));
        width = BG_MAX_DIMENSION;
      } else if (height >= width && height > BG_MAX_DIMENSION) {
        width = Math.round(width * (BG_MAX_DIMENSION / height));
        height = BG_MAX_DIMENSION;
      }

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;
      canvas.getContext("2d").drawImage(img, 0, 0, width, height);
      const dataUrl = canvas.toDataURL("image/jpeg", 0.75);

      try {
        localStorage.setItem(bgImageKey(), dataUrl);
        applyBackgroundImage(dataUrl);
        renderBgSettingsUI();
        showToast("背景圖片已套用");
      } catch (err) {
        // localStorage 空間有限,壓縮後仍太大時會在這裡失敗,不讓整個 App 掛掉
        showToast("圖片太大,無法儲存,請換一張較小的圖片再試一次");
      }
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function removeBgImage() {
  localStorage.removeItem(bgImageKey());
  applyBackgroundImage(null);
  renderBgSettingsUI();
  showToast("已移除背景圖片");
}

document.getElementById("chooseBgBtn").addEventListener("click", () => {
  document.getElementById("bgImageInput").click();
});
document.getElementById("bgImageInput").addEventListener("change", (e) => {
  const file = e.target.files[0];
  if (file) handleBgImageFile(file);
  e.target.value = ""; // 清空,下次選同一張檔案也能觸發 change
});
document.getElementById("removeBgBtn").addEventListener("click", removeBgImage);
</script>

</body>
